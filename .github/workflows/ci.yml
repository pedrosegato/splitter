name: CI

on:
  push:
    branches: [ main ]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  fmt:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  clippy:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - name: Install Linux audio deps
        if: matrix.os == 'ubuntu-latest'
        run: sudo apt-get update && sudo apt-get install -y libasound2-dev libudev-dev libopus-dev pkg-config
      - name: Install macOS opus
        if: matrix.os == 'macos-latest'
        run: brew install opus pkg-config
      - name: Install Windows opus (vcpkg)
        if: matrix.os == 'windows-latest'
        run: |
          vcpkg install opus:x64-windows
          echo "VCPKG_ROOT=$env:VCPKG_INSTALLATION_ROOT" >> $env:GITHUB_ENV
        shell: pwsh
      - run: cargo clippy --workspace --all-targets -- -D warnings

  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Install Linux audio deps
        if: matrix.os == 'ubuntu-latest'
        run: sudo apt-get update && sudo apt-get install -y libasound2-dev libudev-dev libopus-dev pkg-config
      - name: Install macOS opus
        if: matrix.os == 'macos-latest'
        run: brew install opus pkg-config
      # macOS runners can't grant Screen Recording permission to the test binary;
      # loopback tests are written to accept the AudioError::ScreenRecordingPermissionDenied
      # and AudioError::BuildStream arms, so they pass without producing audio.
      - name: Install Windows opus (vcpkg)
        if: matrix.os == 'windows-latest'
        run: |
          vcpkg install opus:x64-windows
          echo "VCPKG_ROOT=$env:VCPKG_INSTALLATION_ROOT" >> $env:GITHUB_ENV
        shell: pwsh
      # Phase 2 mDNS pair-discovery test logs "inconclusive" when the CI sandbox
      # blocks multicast; it never fails on absence. End-to-end signaling (loopback_two_daemons)
      # runs over 127.0.0.1 and is fully deterministic.
      - run: cargo test --workspace --all-features --all-targets --no-fail-fast

  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Install Linux audio deps
        if: matrix.os == 'ubuntu-latest'
        run: sudo apt-get update && sudo apt-get install -y libasound2-dev libudev-dev libopus-dev pkg-config
      - name: Install macOS opus
        if: matrix.os == 'macos-latest'
        run: brew install opus pkg-config
      - name: Install Windows opus (vcpkg)
        if: matrix.os == 'windows-latest'
        run: |
          vcpkg install opus:x64-windows
          echo "VCPKG_ROOT=$env:VCPKG_INSTALLATION_ROOT" >> $env:GITHUB_ENV
        shell: pwsh
      - run: cargo build --workspace --release
